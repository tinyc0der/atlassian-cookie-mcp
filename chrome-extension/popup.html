<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sync Atlassian cookies</title>
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, "Segoe UI", sans-serif; width: 280px; margin: 0; padding: 14px; color: #202124; }
    h1 { font-size: 14px; margin: 0 0 6px; }
    #host { margin: 0 0 12px; color: #5f6368; font-size: 12px; word-break: break-all; }
    #host strong { color: #202124; font-weight: 600; }
    button { width: 100%; padding: 9px; font-weight: 600; border: 0; border-radius: 4px; cursor: pointer; background: #1868db; color: #fff; }
    button:hover { background: #1558c0; }
    button:disabled { background: #9aa0a6; cursor: not-allowed; }
    #status { margin-top: 10px; white-space: pre-wrap; font-size: 12px; min-height: 16px; }
    #status.ok { color: #188038; }
    #status.err { color: #d93025; }
    .hint { margin-top: 12px; color: #80868b; font-size: 11px; }
    code { background: #f1f3f4; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Sync Atlassian cookies</h1>
  <p id="host">Detecting tab…</p>
  <button id="sync">Sync cookies</button>
  <div id="status"></div>
  <div class="hint">
    Open a Jira/Confluence tab, then Sync. One-time setup:
    <code>atlassian-cli install-host</code>
  </div>
  <script src="popup.js"></script>
</body>
</html>
