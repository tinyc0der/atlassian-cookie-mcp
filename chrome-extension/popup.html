<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Export Atlassian cookies</title>
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, "Segoe UI", sans-serif; width: 320px; margin: 0; padding: 14px; color: #202124; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    p.sub { margin: 0 0 10px; color: #5f6368; font-size: 12px; }
    label { display: block; margin: 10px 0 2px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #bbb; border-radius: 4px; }
    button { margin-top: 14px; width: 100%; padding: 9px; font-weight: 600; border: 0; border-radius: 4px; background: #1868db; color: #fff; cursor: pointer; }
    button:hover { background: #1558c0; }
    #status { margin-top: 10px; white-space: pre-wrap; font-size: 12px; min-height: 16px; }
    #status.ok { color: #188038; }
    #status.err { color: #d93025; }
    .hint { margin-top: 12px; color: #80868b; font-size: 11px; }
    code { background: #f1f3f4; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Export Atlassian cookies</h1>
  <p class="sub">Reads your live Jira/Confluence session (including HttpOnly cookies) and downloads a JSON file.</p>

  <label for="jira">Jira host</label>
  <input id="jira" placeholder="https://yourco.atlassian.net" autocomplete="off" spellcheck="false" />

  <label for="confluence">Confluence host</label>
  <input id="confluence" placeholder="https://yourco.atlassian.net" autocomplete="off" spellcheck="false" />

  <button id="export">Export cookies</button>
  <div id="status"></div>

  <div class="hint">
    Downloads <code>atlassian-cookies.json</code>, then run:<br />
    <code>atlassian-cli import ~/Downloads/atlassian-cookies.json</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
